name = "me-portfolio"
main = "workers/app.ts"
compatibility_date = "2024-11-01"

# nodejs_compat enables Web Crypto, streams, and process.env in Workers.
# Required because the React Router server bundle uses Node.js-compatible APIs.
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./build/client"
binding = "ASSETS"

# Local development vars — overridden per environment below.
[vars]
PAYLOAD_API_URL = "http://localhost:3001"

[env.production]
[env.production.vars]
PAYLOAD_API_URL = "https://cms.harihoudini.dev"
