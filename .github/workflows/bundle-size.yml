# bundle-size.yml — Bundle size report on pull requests
#
# Runs pnpm build on every PR and posts a comment showing Next.js output sizes.
# Makes accidental bloat visible before merge.
#
# NOTE: pnpm build requires DATABASE_URL (Payload connects at build time).
# The build step uses continue-on-error so the workflow still posts a comment
# when secrets are unavailable (PRs from forks, Phase 1–3 branches).
# Full bundle reporting requires Varlock-injected secrets — available in deploy.yml.
#
# Next.js output directories (replaces old Vite build/client + build/server):
#   .next/static/   — browser assets (JS chunks, CSS, media)
#   .next/server/   — SSR assets

name: Bundle Size

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: bundle-size-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  bundle-size:
    name: Report bundle size
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # pnpm build requires DATABASE_URL — Payload connects at build time.
      # continue-on-error so the report step always runs (posts partial info).
      # Full bundle data is only available when Varlock injects secrets (deploy.yml).
      - name: Build
        id: build
        run: pnpm build
        continue-on-error: true
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Report bundle sizes
        uses: actions/github-script@v7
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const { execSync } = require('child_process');
            const buildOk = process.env.BUILD_OUTCOME === 'success';

            let staticSize = '—';
            let serverSize = '—';
            let chunks = '';

            if (buildOk) {
              try {
                staticSize = execSync('du -sh .next/static 2>/dev/null | cut -f1', { encoding: 'utf8' }).trim();
              } catch { /* ignore */ }
              try {
                serverSize = execSync('du -sh .next/server 2>/dev/null | cut -f1', { encoding: 'utf8' }).trim();
              } catch { /* ignore */ }
              try {
                chunks = execSync(
                  'find .next/static/chunks -name "*.js" -not -name "*.map" | sort | xargs -I{} sh -c \'printf "%-70s %s\\n" "{}" "$(du -sh "{}" | cut -f1)"\'',
                  { encoding: 'utf8' }
                ).trim();
              } catch { /* ignore */ }
            }

            const statusLine = buildOk
              ? ''
              : '> ⚠️ Build skipped — `DATABASE_URL` not available in CI. ' +
                'Full bundle data is reported in the deploy workflow once secrets are injected via Varlock.';

            const rows = [
              '| Output | Size |',
              '|---|---|',
              `| \`.next/static\` (browser assets) | **${staticSize}** |`,
              `| \`.next/server\` (SSR)             | **${serverSize}** |`,
            ].join('\n');

            const details = buildOk && chunks ? [
              '<details>',
              '<summary>JavaScript chunks (.next/static/chunks)</summary>',
              '',
              '```',
              chunks,
              '```',
              '',
              '</details>',
            ].join('\n') : '';

            const sha = context.sha.slice(0, 7);
            const body = ['## Bundle Size Report', '', statusLine, '', rows, '', details, '', `> Generated from commit \`${sha}\``]
              .filter((l, i, a) => !(l === '' && a[i - 1] === ''))
              .join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('## Bundle Size Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
