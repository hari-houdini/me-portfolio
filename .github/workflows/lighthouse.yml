# lighthouse.yml — Lighthouse CI performance, a11y, and best-practices audit
#
# ─── STATUS: PLACEHOLDER — NOT ACTIVE ON PRs ────────────────────────────────
#
# This workflow requires a running server URL to audit against.
# The app uses Cloudflare Workers SSR — a production URL is needed.
#
# TODO (Phase 5 — Deploy):
#   1. Set the SITE_URL secret to the Cloudflare Workers deployment URL
#   2. Add LHCI_GITHUB_APP_TOKEN secret (from https://github.com/apps/lighthouse-ci)
#   3. Uncomment the `pull_request` trigger below
#   4. Remove `workflow_dispatch` or keep it for on-demand audits
#
# When activated, this workflow will:
#   - Run Lighthouse against the production URL on each PR
#   - Report: Performance, Accessibility, Best Practices, SEO scores
#   - Post a comment to the PR with score changes vs the last run
#   - Fail the check if any score drops below the threshold in .lighthouserc.json
#
# ─── ACTIVATION CHECKLIST ────────────────────────────────────────────────────
#   [ ] Deploy app to Cloudflare (Phase 5)
#   [ ] Install Lighthouse CI GitHub App: https://github.com/apps/lighthouse-ci
#   [ ] Add LHCI_GITHUB_APP_TOKEN as a repo secret
#   [ ] Add SITE_URL as a repo secret (e.g. https://harihoudini.dev)
#   [ ] Create .lighthouserc.json in repo root with score thresholds
#   [ ] Uncomment `pull_request` trigger
# ─────────────────────────────────────────────────────────────────────────────

name: Lighthouse CI

# TODO(Phase 5): Uncomment pull_request trigger once SITE_URL is known.
# on:
#   pull_request:
#     types: [opened, synchronize]

# Manual-only until Phase 5 deployment is complete
on:
  workflow_dispatch:
    inputs:
      url:
        description: "Site URL to audit (e.g. https://harihoudini.dev)"
        required: true
        type: string

permissions:
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun --collect.url="${{ inputs.url }}" --upload.target=temporary-public-storage
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
